{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">
        <h2 class="text-center">Login</h2>
        <div id="login-error" class="alert alert-danger d-none"></div>
        
        <form id="login-form">
            <input  type="text"     id="username" class="form-control mb-2" placeholder="Username" required>
            <input  type="password" id="password" class="form-control mb-2" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="mt-3 text-center">No account yet? <a href="/signup">Sign up</a></p>
    </div>
</div>

<script>
// Sends login credential to OAuth2 token endpoint
async function handleLogin(event) {
    event.preventDefault();

    const userField = document.getElementById('username').value;
    const passField = document.getElementById('password').value;

    // OAuth2 form data
    const params = new URLSearchParams();
    params.append('username', userField);
    params.append('password', passField);

    try {
        const response = await fetch(
            '/auth/token', {
            method: 'POST',
            body:   params
        });

        if ( response.ok ) {
            const data = await response.json()
            
            localStorage.setItem('access_token', data.access_token); 
            window.location.href = '/products_list';    // Redirect after login
        }
        else {
            let errorMessage = "Error logging in!";
            
            const err = document.getElementById('login-error');
            
            if ( response.status === 401 ) {
                errorMessage = "Invalid credentials";
            } 
            else if ( response.status >= 500 ) {
                errorMessage = "Internal server error";
            }

            err.textContent = errorMessage;
            err.classList.remove('d-none');
        }
    }
    catch (e) {
        console.log("Error", e);
    }
}
document.getElementById('login-form').onsubmit = handleLogin;

</script>

{% endblock %}
