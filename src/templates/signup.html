{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">
        <h2 class="text-center">Sign up</h2>
        <div id="reg-error"   class="alert alert-danger d-none"></div>
        <div id="reg-success" class="alert alert-success d-none">Account created! Redirecting...</div>
        
        <form id="register-form">
            <input  type="text"     id="reg-username"  class="form-control mb-2" placeholder="Username" required>
            <input  type="email"    id="reg-email"     class="form-control mb-2" placeholder="Email (Optional)">
            <input  type="text"     id="reg-name"      class="form-control mb-2" placeholder="Name (Optional)">
            <input  type="text"     id="reg-last_name" class="form-control mb-2" placeholder="Last name (Optional)">
            <input  type="password" id="reg-password"  class="form-control mb-2" placeholder="Password" required>
            
            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <p class="mt-3 text-center">Already have an account? <a href="/login">Login</a></p>
    </div>
</div>

<script>
// Utility
const delay = ms => new Promise(res => setTimeout(res, ms));


async function handleSignup(event) {
    event.preventDefault();

    const userField      = document.getElementById('reg-username').value;
    const emailField     = document.getElementById('reg-email').value;
    const firstNameField = document.getElementById('reg-name').value
    const lastNameField  = document.getElementById('reg-last_name').value;
    const fullNameField  = (firstNameField || lastNameField) 
                           ? `${firstNameField} ${lastNameField}` : null;
    const passField      = document.getElementById('reg-password').value;

    

    const userData = {
        username:  userField,
        email:     emailField    || null,
        full_name: fullNameField || null,
        password:  passField,
        disabled:  false
    };

    try {
        const response = await fetch('/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body:   JSON.stringify(userData)
        });

        if ( response.ok ) {
            document.getElementById('reg-success').classList.remove('d-none');
            document.getElementById('reg-error').classList.add('d-none');
            
            await delay(2500);
            window.location.href = '/login';    // Redirect to login page
        }
        else {
            const err = document.getElementById('reg-error');
            
            err.textContent = "Error signing up!";
            err.classList.remove('d-none');
        }
    }
    catch (e) {
        console.log("Error", e);
    }
}
document.getElementById('register-form').onsubmit = handleSignup;
</script>

{% endblock %}
