<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Product Manager{% endblock %}</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Product Manager</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('get_products_list_ui') }}">Products List</a>
          </li>

          <li class="nav-item" id="nav-login">
            <a class="nav-link text-primary" href="/login">Login</a>
          </li>

          <li class="nav-item d-none" id="nav-logout">
            <a class="nav-link text-danger" href="#" onclick="logout()">Logout</a>
          </li>

        </ul>
      </div>  
    </div>
  </nav>

  <!-- Main Content Area -->
  <div class="container mt-4">
    {% block content %}
    {% endblock %}
  </div>

  <!-- Footer -->
  <footer class="footer py-3 bg-light mt-5">
    <div class="container text-center">
      <span>&copy; Footer </span>
    </div>
  </footer>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<script>
function updateAuthUI() {
  const token      = localStorage.getItem('access_token');
  const loginLink  = document.getElementById('nav-login');
  const logoutLink = document.getElementById('nav-logout')

  if ( token ) {  // User Logged In: show log-out, hide log-in
    loginLink.classList.add('d-none');
    logoutLink.classList.remove('d-none');
  }
  else {  // User Logged Out: show log-in
    loginLink.classList.remove('d-none');
    logoutLink.classList.add('d-none');
  }
}

function logout() {
  localStorage.removeItem('access_token');
  window.location.href = '/';
}
document.addEventListener('DOMContentLoaded', updateAuthUI);
</script>
